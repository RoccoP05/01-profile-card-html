<!DOCTYPE html>
<!-- Profile Card HTML Template -->
<html lang="en">
<head>
  <!-- Character encoding for the document -->
  <meta charset="UTF-8">
  <!-- Viewport settings for responsive design on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Page title displayed in browser tab -->
  <title>Rocco's Profile Card</title>
  <!-- Link to external CSS stylesheet for styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Main card container for the profile -->
  <div class="card">
    <!-- Profile photo -->
    <img src="img/placeholder.png" alt="Rocco's profile photo" class="profile-photo">
    <!-- Profile name - main heading -->
    <h1>Rocco Palepoi</h1>
    <!-- Job title - secondary heading -->
    <h2>Web Developer</h2>
    <!-- Brief bio or description -->
    <p>Excited to create and learn</p>

    <!-- Section heading for links -->
    <h3>My Favorite Websites</h3>
    <!-- Bulleted list of links -->
    <ul>
      <li><a href="https://github.com">GitHub</a></li>
      <li><a href="https://stackoverflow.com">Stack Overflow</a></li>
      <li><a href="https://developer.mozilla.org">MDN Web Docs</a></li>
      <li><a href="https://www.w3schools.com">W3Schools</a></li>
    </ul>
  </div>
</body>
</html>
